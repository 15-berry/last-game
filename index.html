<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解読クエスト</title>
    
    <meta name="robots" content="noimageindex, noarchive, nosnippet">
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="summary">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow: hidden;
            /* テキスト選択を徹底排除 */
            user-select: none;
            -webkit-user-select: none;
        }

        #container {
            position: relative;
            text-align: center;
        }

        #decode-btn {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            touch-action: none; /* ブラウザのデフォルト動作（スクロールやズーム）を無効化 */
            position: relative;
            z-index: 2;
            transition: opacity 0.2s; /* 変化を少し滑らかに */
        }

        #hidden-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            z-index: 1;
            display: none; /* 最初は非表示 */
        }

        #input-area {
            margin-top: 20px;
            display: none;
        }

        input {
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 4px;
            user-select: auto; /* 入力欄だけは触れるように */
            -webkit-user-select: auto;
        }

        #image-container {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .puzzle-img {
            width: 120px;
            height: 120px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #333;
            font-weight: bold;
            font-size: 20px;
        }

        #final-link {
            display: none;
            font-size: 20px;
            font-weight: bold;
            color: blue;
            word-break: break-all;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="hidden-hint">暗証番号は？と聞いてみよう</div>
        
        <button id="decode-btn">解読</button>

        <div id="input-area">
            <input type="text" id="passcode" placeholder="暗証番号を入力">
        </div>

        <div id="image-container">
            <div class="puzzle-img" data-id="1">画像1</div>
            <div class="puzzle-img" data-id="2">画像2</div>
            <div class="puzzle-img" data-id="3">画像3</div>
            <div class="puzzle-img" data-id="4">画像4</div>
        </div>

        <div id="final-link">
            完了！URL: <a href="https://example.com/goal" target="_blank">https://example.com/goal</a>
        </div>
    </div>

    <script>
        const decodeBtn = document.getElementById('decode-btn');
        const hint = document.getElementById('hidden-hint');
        const inputArea = document.getElementById('input-area');
        const passcodeInp = document.getElementById('passcode');
        const imgContainer = document.getElementById('image-container');
        const finalLink = document.getElementById('final-link');

        let pressTimer;

        // 状態をリセットする関数（離した時用）
        function resetState() {
            clearTimeout(pressTimer);
            hint.style.display = 'none';
            decodeBtn.style.opacity = '1';
        }

        // 長押し開始時の処理
        function startPress(e) {
            // 3秒後に透けさせる
            pressTimer = setTimeout(() => {
                hint.style.display = 'block';
                decodeBtn.style.opacity = '0.2'; // かなり薄くする
            }, 1000);
        }

        // マウス・タッチイベントの登録
        decodeBtn.addEventListener('mousedown', startPress);
        decodeBtn.addEventListener('mouseup', resetState);
        decodeBtn.addEventListener('mouseleave', resetState); // 枠外に指が逃げた時用

        decodeBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // スマホのメニュー表示などを防止
            startPress();
        });
        decodeBtn.addEventListener('touchend', resetState);
        decodeBtn.addEventListener('touchcancel', resetState);
        
        // 右クリックメニュー禁止
        window.oncontextmenu = function(e) {
            e.preventDefault();
            return false;
        };

        // クリック（短押し）した時の処理
        decodeBtn.addEventListener('click', () => {
            const code = passcodeInp.value;

            if (code === "20112004") {
                decodeBtn.style.display = 'none';
                inputArea.style.display = 'none';
                imgContainer.style.display = 'grid';
            } else {
                const lineUrl = "https://lin.ee/xrhPcNO";
                inputArea.style.display = 'block';
                window.open(lineUrl, '_blank');
            }
        });

        // 画像パズル処理
        const correctOrder = "123422343314412";
        let currentInput = "";

        document.querySelectorAll('.puzzle-img').forEach(img => {
            img.addEventListener('click', () => {
                const id = img.getAttribute('data-id');
                currentInput += id;

                if (correctOrder.startsWith(currentInput)) {
                    if (currentInput === correctOrder) {
                        imgContainer.style.display = 'none';
                        finalLink.style.display = 'block';
                    }
                } else {
                    currentInput = "";
                    alert("順番が違います。最初からやり直し！");
                }
            });
        });
    </script>
</body>
</html>
