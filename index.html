<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>解読クエスト</title>
    
    <meta name="robots" content="noimageindex, noarchive, nosnippet">
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="summary">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #container {
            position: relative;
            text-align: center;
        }

        #decode-btn {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            touch-action: none;
            position: relative;
            z-index: 2;
            transition: opacity 0.2s;
        }

        #hidden-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            z-index: 1;
            display: none;
        }

        #input-area {
            margin-top: 20px;
            display: none;
        }

        input {
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 4px;
            user-select: auto;
            -webkit-user-select: auto;
        }

        #image-container {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 20px;
        }

        .puzzle-img {
            width: 240px;
            height: 240px;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #333;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .img-B { background-image: url('Bberry.png'); }
        .img-C { background-image: url('Cberry.png'); }
        .img-R { background-image: url('Rberry.png'); }
        .img-S { background-image: url('Sberry.png'); }

        #final-link {
            display: none;
            font-size: 20px;
            font-weight: bold;
            color: blue;
            word-break: break-all;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="hidden-hint">暗証番号は？と聞いてみよう</div>
        
        <button id="decode-btn">解読</button>

        <div id="input-area">
            <input type="text" id="passcode" placeholder="暗証番号を入力">
        </div>

        <div id="image-container">
            <div class="puzzle-img img-B" data-id="B"></div>
            <div class="puzzle-img img-C" data-id="C"></div>
            <div class="puzzle-img img-R" data-id="R"></div>
            <div class="puzzle-img img-S" data-id="S"></div>
        </div>

        <div id="final-link">
            完了！URL: <a href="https://example.com/goal" target="_blank">https://example.com/goal</a>
        </div>
    </div>

    <script>
        const decodeBtn = document.getElementById('decode-btn');
        const hiddenHint = document.getElementById('hidden-hint');
        const inputArea = document.getElementById('input-area');
        const passcodeInp = document.getElementById('passcode');
        const imgContainer = document.getElementById('image-container');
        const finalLink = document.getElementById('final-link');

        let pressTimer;
        let isLongPress = false; 

        function resetState() {
            clearTimeout(pressTimer);
            hiddenHint.style.display = 'none';
            decodeBtn.style.opacity = '1';
        }

        function startPress() {
            isLongPress = false; 
            pressTimer = setTimeout(() => {
                isLongPress = true; 
                hiddenHint.style.display = 'block';
                decodeBtn.style.opacity = '0.2';
            }, 1000);
        }

        decodeBtn.addEventListener('mousedown', startPress);
        decodeBtn.addEventListener('mouseup', resetState);
        decodeBtn.addEventListener('mouseleave', resetState);

        decodeBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startPress();
        });
        decodeBtn.addEventListener('touchend', resetState);
        decodeBtn.addEventListener('touchcancel', resetState);
        
        window.oncontextmenu = function(e) { e.preventDefault(); return false; };

        // 暗証番号入力後の挙動
        decodeBtn.addEventListener('click', (e) => {
            if (isLongPress) {
                isLongPress = false; 
                return;
            }

            const code = passcodeInp.value;
            if (code === "20112004") {
                // 正解時
                alert("完璧な調整");
                decodeBtn.style.display = 'none';
                inputArea.style.display = 'none';
                imgContainer.style.display = 'grid';
            } else {
                // 不正解（または初回クリック）時
                if (inputArea.style.display === 'block') {
                    alert("バチッ");
                }
                window.open("https://lin.ee/xrhPcNO", '_blank');
                inputArea.style.display = 'block';
            }
        });

        // パズル処理
        const finalAnswer = "BCRSCCRSRRBSSBC";
        let currentInput = "";

        document.querySelectorAll('.puzzle-img').forEach(img => {
            img.addEventListener('click', () => {
                const id = img.getAttribute('data-id');
                currentInput += id;

                if (finalAnswer.startsWith(currentInput)) {
                    if (currentInput === finalAnswer) {
                        imgContainer.style.display = 'none';
                        finalLink.style.display = 'block';
                    }
                } else {
                    currentInput = "";
                }
            });
        });
    </script>
</body>
</html>
