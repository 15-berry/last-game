<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解読クエスト</title>
    
    <meta name="robots" content="noimageindex, noarchive, nosnippet">
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">
    <meta property="og:image" content="">
    <meta name="twitter:card" content="summary">

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #container {
            text-align: center;
        }

        #decode-btn {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            touch-action: manipulation;
            position: relative;
            z-index: 2;
        }

        #hidden-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            z-index: 1;
            display: none;
        }

        #input-area {
            margin-top: 20px;
            display: none;
        }

        input {
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #image-container {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .puzzle-img {
            width: 120px;
            height: 120px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #333;
            font-weight: bold;
            font-size: 20px;
        }

        #final-link {
            display: none;
            font-size: 20px;
            font-weight: bold;
            color: blue;
            word-break: break-all;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="hidden-hint">暗証番号は？と聞いてみよう</div>
        
        <button id="decode-btn">解読</button>

        <div id="input-area">
            <input type="text" id="passcode" placeholder="暗証番号を入力">
        </div>

        <div id="image-container">
            <div class="puzzle-img" data-id="1">画像1</div>
            <div class="puzzle-img" data-id="2">画像2</div>
            <div class="puzzle-img" data-id="3">画像3</div>
            <div class="puzzle-img" data-id="4">画像4</div>
        </div>

        <div id="final-link">
            完了！URL: <a href="https://example.com/goal" target="_blank">https://example.com/goal</a>
        </div>
    </div>

    <script>
        const decodeBtn = document.getElementById('decode-btn');
        const hint = document.getElementById('hidden-hint');
        const inputArea = document.getElementById('input-area');
        const passcodeInp = document.getElementById('passcode');
        const imgContainer = document.getElementById('image-container');
        const finalLink = document.getElementById('final-link');

        let pressTimer;

        // --- 1. 長押し処理 ---
        function startPress() {
            pressTimer = setTimeout(() => {
                hint.style.display = 'block';
                decodeBtn.style.opacity = '0.3';
            }, 1000);
        }

        function cancelPress() {
            clearTimeout(pressTimer);
            hint.style.display = 'none';
            decodeBtn.style.opacity = '1';
        }

        decodeBtn.addEventListener('mousedown', startPress);
        decodeBtn.addEventListener('mouseup', cancelPress);
        decodeBtn.addEventListener('touchstart', (e) => { startPress(); }, {passive: true});
        decodeBtn.addEventListener('touchend', cancelPress);
        
        window.oncontextmenu = function(event) {
            if (event.target.id === 'decode-btn') {
                event.preventDefault();
                return false;
            }
        };

        // --- 2. クリック処理 ---
        decodeBtn.addEventListener('click', () => {
            const code = passcodeInp.value;

            if (code === "20112004") {
                decodeBtn.style.display = 'none';
                inputArea.style.display = 'none';
                imgContainer.style.display = 'grid';
            } else {
                // ご希望のリフレッシュ処理をシミュレートしてLINEへ飛ばす
                // プレビューを出さない設定を施した上で遷移させます
                const lineUrl = "https://lin.ee/xrhPcNO";
                
                // 入力欄を表示
                inputArea.style.display = 'block';
                
                // 別タブでLINEを開く
                window.open(lineUrl, '_blank');
            }
        });

        // --- 3. 画像パズル処理 ---
        const correctOrder = "123422343314412";
        let currentInput = "";

        document.querySelectorAll('.puzzle-img').forEach(img => {
            img.addEventListener('click', () => {
                const id = img.getAttribute('data-id');
                currentInput += id;

                if (correctOrder.startsWith(currentInput)) {
                    if (currentInput === correctOrder) {
                        imgContainer.style.display = 'none';
                        finalLink.style.display = 'block';
                    }
                } else {
                    currentInput = "";
                    alert("順番が違います。最初からやり直し！");
                }
            });
        });
    </script>
</body>
</html>
